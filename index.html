<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Emma & Rob's Dream House</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    font-family: 'Inter', sans-serif;
    background: #1a1612;
    color: #e8e0d4;
    overflow: hidden;
    height: 100%; width: 100%;
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    touch-action: none;
  }
  #canvas-container { width: 100%; height: 100%; position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
  canvas { display: block; }
  #header {
    position: absolute; top: 0; left: 0; right: 0;
    padding: 14px 20px;
    background: linear-gradient(180deg, rgba(26,22,18,0.95) 0%, rgba(26,22,18,0) 100%);
    z-index: 10; pointer-events: none;
  }
  #header h1 { font-family: 'Playfair Display', serif; font-size: 1.3rem; font-weight: 600; color: #d4a574; letter-spacing: 0.05em; }
  #header p { font-size: 0.7rem; color: #9a8b7a; margin-top: 2px; }
  .panel-toggle {
    width: 36px; height: 36px;
    background: rgba(42,36,28,0.9); border: 1px solid rgba(212,165,116,0.4); border-radius: 8px;
    color: #d4a574; font-size: 1rem; cursor: pointer; backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center; transition: all 0.3s; margin-bottom: 6px;
  }
  .panel-toggle:hover { background: rgba(62,52,38,0.95); border-color: rgba(212,165,116,0.7); }
  .panel-content { display: flex; flex-direction: column; gap: 6px; transition: all 0.3s ease; overflow: hidden; max-height: 500px; opacity: 1; }
  .panel-content.collapsed { max-height: 0; opacity: 0; gap: 0; pointer-events: none; }
  #floor-panel { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; z-index: 10; }
  .floor-btn {
    width: 110px; padding: 8px 12px;
    background: rgba(42,36,28,0.9); border: 1px solid rgba(212,165,116,0.3); border-radius: 8px;
    color: #c4a882; font-family: 'Inter', sans-serif; font-size: 0.65rem; font-weight: 500;
    letter-spacing: 0.04em; text-transform: uppercase; cursor: pointer; transition: all 0.3s;
    text-align: left; backdrop-filter: blur(10px);
  }
  .floor-btn:hover { background: rgba(62,52,38,0.95); border-color: rgba(212,165,116,0.6); }
  .floor-btn.active { background: rgba(212,165,116,0.15); border-color: #d4a574; color: #e8d4bc; }
  .floor-btn .floor-label { font-family: 'Playfair Display', serif; font-size: 0.8rem; display: block; margin-bottom: 1px; color: #d4a574; }
  #room-info {
    position: absolute; bottom: max(90px, env(safe-area-inset-bottom,24px)+70px); left: 50%; transform: translateX(-50%);
    padding: 12px 24px; background: rgba(42,36,28,0.92); border: 1px solid rgba(212,165,116,0.3);
    border-radius: 12px; backdrop-filter: blur(10px); z-index: 10; text-align: center;
    transition: all 0.3s; opacity: 0; pointer-events: none;
  }
  #room-info.visible { opacity: 1; }
  #room-info .room-name { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: #d4a574; margin-bottom: 3px; }
  #room-info .room-desc { font-size: 0.68rem; color: #9a8b7a; }
  #view-panel { position: absolute; right: 16px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; z-index: 10; }
  .view-btn {
    width: 40px; height: 40px;
    background: rgba(42,36,28,0.9); border: 1px solid rgba(212,165,116,0.3); border-radius: 8px;
    color: #c4a882; font-size: 1rem; cursor: pointer; transition: all 0.3s;
    display: flex; align-items: center; justify-content: center; backdrop-filter: blur(10px);
  }
  .view-btn:hover { background: rgba(62,52,38,0.95); border-color: rgba(212,165,116,0.6); }
  .view-btn.active { background: rgba(212,165,116,0.15); border-color: #d4a574; }
  #legend-wrapper {
    position: absolute; bottom: max(90px, env(safe-area-inset-bottom,24px)+70px); right: 16px;
    z-index: 10; display: flex; flex-direction: column; align-items: flex-end;
  }
  #legend {
    display: flex; flex-direction: column; gap: 3px; font-size: 0.58rem; color: #9a8b7a;
    background: rgba(42,36,28,0.85); padding: 8px 10px; border-radius: 8px;
    border: 1px solid rgba(212,165,116,0.2); backdrop-filter: blur(10px);
    transition: all 0.3s ease; overflow: hidden; max-height: 200px; opacity: 1;
  }
  #legend.collapsed { max-height: 0; opacity: 0; padding: 0 10px; pointer-events: none; border-color: transparent; }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .legend-swatch { width: 9px; height: 9px; border-radius: 2px; }
  #instructions { position: absolute; bottom: max(90px, env(safe-area-inset-bottom,24px)+70px); left: 16px; font-size: 0.55rem; color: #6a5d50; z-index: 10; line-height: 1.5; }
  @media (max-width: 768px) {
    #floor-panel { left: 8px; top: auto; bottom: 16px; transform: none; }
    .floor-btn { width: 80px; padding: 6px 8px; font-size: 0.55rem; }
    .floor-btn .floor-label { font-size: 0.65rem; }
    .panel-content { gap: 4px; }
    #header { padding: 8px 14px; }
    #header h1 { font-size: 1rem; }
    #header p { font-size: 0.65rem; }
    #view-panel { right: 8px; top: auto; bottom: 16px; transform: none; }
    .view-btn { width: 34px; height: 34px; font-size: 0.85rem; }
    .panel-toggle { width: 32px; height: 32px; font-size: 0.85rem; }
    #legend-wrapper { display: none; }
    #instructions { display: none; }
    #room-info { bottom: auto !important; top: 65px; max-width: 85vw; padding: 10px 16px; }
    #room-info .room-name { font-size: 0.9rem; }
    #room-info .room-desc { font-size: 0.62rem; }
  }
</style>
</head>
<body>
<div id="canvas-container">
  <div id="header">
    <h1>Emma & Rob's Dream House</h1>
    <p>Interactive 3D Model — Click rooms to explore</p>
  </div>
  <div id="floor-panel">
    <button class="panel-toggle" id="toggle-floors" title="Toggle floors">🏠</button>
    <div class="panel-content" id="floor-buttons">
      <button class="floor-btn active" data-floor="all"><span class="floor-label">All Floors</span>Full View</button>
      <button class="floor-btn" data-floor="basement"><span class="floor-label">Basement</span>Theatre & Bar</button>
      <button class="floor-btn" data-floor="floor1"><span class="floor-label">Floor 1</span>Living & Kitchen</button>
      <button class="floor-btn" data-floor="floor2"><span class="floor-label">Floor 2</span>Bedrooms & Laundry</button>
      <button class="floor-btn" data-floor="floor3"><span class="floor-label">Floor 3</span>Master Suite</button>
      <button class="floor-btn" data-floor="outdoor"><span class="floor-label">Outdoor</span>Patio & Fire Pit</button>
    </div>
  </div>
  <div id="view-panel">
    <button class="panel-toggle" id="toggle-views" title="Toggle views">👁</button>
    <div class="panel-content" id="view-buttons">
      <button class="view-btn" id="btn-top" title="Top View">⬆</button>
      <button class="view-btn active" id="btn-3d" title="3D View">◆</button>
      <button class="view-btn" id="btn-front" title="Front View">▣</button>
    </div>
  </div>
  <div id="room-info">
    <div class="room-name" id="room-name"></div>
    <div class="room-desc" id="room-desc"></div>
  </div>
  <div id="legend-wrapper">
    <button class="panel-toggle" id="toggle-legend" title="Color key" style="align-self:flex-end;margin-bottom:6px">🎨</button>
    <div id="legend">
      <div class="legend-item"><div class="legend-swatch" style="background:#8B6F47"></div> Living Spaces</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#6B8E5A"></div> Kitchen & Dining</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#7A6B8A"></div> Bedrooms</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#5A8B8B"></div> Bathrooms</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#9A7B5A"></div> Utility</div>
    </div>
  </div>
  <div id="instructions">Drag to rotate · Scroll to zoom · Click rooms</div>
</div>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ═══════════════════════════════════════════════════
// SCENE
// ═══════════════════════════════════════════════════
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB); // Sky blue
scene.fog = new THREE.FogExp2(0xC8D8E8, 0.004);

const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 500);
camera.position.set(55, 50, 55);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.getElementById('canvas-container').appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 12;
controls.maxDistance = 130;
controls.maxPolarAngle = Math.PI / 2.05;
controls.target.set(0, 6, 0);

// ═══════════════════════════════════════════════════
// LIGHTING — warm golden hour
// ═══════════════════════════════════════════════════
scene.add(new THREE.AmbientLight(0xffeedd, 0.5));

const sun = new THREE.DirectionalLight(0xfff0d0, 1.5);
sun.position.set(40, 60, 30);
sun.castShadow = true;
sun.shadow.mapSize.set(4096, 4096);
sun.shadow.camera.far = 200;
sun.shadow.camera.left = -80;
sun.shadow.camera.right = 80;
sun.shadow.camera.top = 80;
sun.shadow.camera.bottom = -80;
sun.shadow.bias = -0.0005;
scene.add(sun);

scene.add(new THREE.DirectionalLight(0xd4a574, 0.3).translateX(-30).translateY(20).translateZ(-15));
scene.add(new THREE.HemisphereLight(0x87CEEB, 0x3a5a1a, 0.4));

// ═══════════════════════════════════════════════════
// TEXTURE HELPERS
// ═══════════════════════════════════════════════════
function brickTexture(w=512, h=512) {
  const c = document.createElement('canvas'); c.width=w; c.height=h;
  const ctx = c.getContext('2d');
  const colors = ['#8B4513','#7A3A10','#9B5523','#6B3410','#8B5533','#7B4520'];
  const bw=48, bh=20, gap=3;
  ctx.fillStyle = '#5A3A20'; ctx.fillRect(0,0,w,h);
  for(let row=0; row<h/bh+1; row++) {
    const offset = row%2 ? bw/2 : 0;
    for(let col=-1; col<w/bw+1; col++) {
      ctx.fillStyle = colors[Math.floor(Math.random()*colors.length)];
      const x=col*bw+offset+gap/2, y=row*bh+gap/2;
      ctx.fillRect(x, y, bw-gap, bh-gap);
      // Slight color variation
      ctx.fillStyle = `rgba(0,0,0,${Math.random()*0.15})`;
      ctx.fillRect(x, y, bw-gap, bh-gap);
    }
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(4,4);
  return tex;
}

function woodTexture(w=256, h=256, baseColor='#5C3A1E') {
  const c = document.createElement('canvas'); c.width=w; c.height=h;
  const ctx = c.getContext('2d');
  ctx.fillStyle = baseColor; ctx.fillRect(0,0,w,h);
  for(let i=0; i<60; i++) {
    ctx.strokeStyle = `rgba(0,0,0,${0.03+Math.random()*0.06})`;
    ctx.lineWidth = 1+Math.random()*2;
    ctx.beginPath();
    const y = Math.random()*h;
    ctx.moveTo(0, y+Math.random()*3);
    for(let x=0; x<w; x+=20) ctx.lineTo(x, y+Math.random()*4-2);
    ctx.stroke();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

function roofTexture(w=512, h=512) {
  const c = document.createElement('canvas'); c.width=w; c.height=h;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#2A1A0A'; ctx.fillRect(0,0,w,h);
  const sw=40, sh=15;
  for(let row=0; row<h/sh+1; row++) {
    const offset = row%2 ? sw/2 : 0;
    for(let col=-1; col<w/sw+1; col++) {
      const shade = 25 + Math.floor(Math.random()*20);
      ctx.fillStyle = `rgb(${shade+15},${shade+5},${shade})`;
      ctx.beginPath();
      const x=col*sw+offset, y=row*sh;
      ctx.moveTo(x,y+sh); ctx.lineTo(x+sw/2,y); ctx.lineTo(x+sw,y+sh); ctx.closePath();
      ctx.fill();
    }
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(3,3);
  return tex;
}

function stoneTexture(w=256, h=256) {
  const c = document.createElement('canvas'); c.width=w; c.height=h;
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#8A8070'; ctx.fillRect(0,0,w,h);
  for(let i=0; i<200; i++) {
    ctx.fillStyle = `rgba(${Math.random()>0.5?0:255},${Math.random()>0.5?0:255},${Math.random()>0.5?0:255},${Math.random()*0.04})`;
    ctx.fillRect(Math.random()*w, Math.random()*h, 3+Math.random()*8, 3+Math.random()*8);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  return tex;
}

// ═══════════════════════════════════════════════════
// MATERIALS
// ═══════════════════════════════════════════════════
const M = {
  brick: new THREE.MeshStandardMaterial({ map: brickTexture(), roughness: 0.85, metalness: 0 }),
  brickTrans: new THREE.MeshStandardMaterial({ map: brickTexture(), roughness: 0.85, transparent: true, opacity: 0.25 }),
  walnut: new THREE.MeshStandardMaterial({ map: woodTexture(256,256,'#5C3A1E'), roughness: 0.6, metalness: 0.05 }),
  walnutFloor: new THREE.MeshStandardMaterial({ map: woodTexture(512,512,'#7A5A3A'), roughness: 0.5, metalness: 0.05 }),
  oak: new THREE.MeshStandardMaterial({ map: woodTexture(256,256,'#8B7355'), roughness: 0.55, metalness: 0.05 }),
  cream: new THREE.MeshStandardMaterial({ color: 0xF0E6D6, roughness: 0.9 }),
  creamWall: new THREE.MeshStandardMaterial({ color: 0xEDE4D4, roughness: 0.85 }),
  stone: new THREE.MeshStandardMaterial({ map: stoneTexture(), roughness: 0.8 }),
  stoneFloor: new THREE.MeshStandardMaterial({ color: 0x7A7060, roughness: 0.8 }),
  roof: new THREE.MeshStandardMaterial({ map: roofTexture(), roughness: 0.85 }),
  glass: new THREE.MeshStandardMaterial({ color: 0x99CCEE, roughness: 0.05, metalness: 0.3, transparent: true, opacity: 0.25 }),
  stainedGlass: new THREE.MeshStandardMaterial({ color: 0x338855, roughness: 0.2, transparent: true, opacity: 0.5, emissive: 0x224422, emissiveIntensity: 0.3 }),
  grass: new THREE.MeshStandardMaterial({ color: 0x4A7A35, roughness: 0.95 }),
  patio: new THREE.MeshStandardMaterial({ map: stoneTexture(), color: 0x9A8A78, roughness: 0.8 }),
  metal: new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.3, metalness: 0.8 }),
  darkFabric: new THREE.MeshStandardMaterial({ color: 0x3A3530, roughness: 0.95 }),
  couchFabric: new THREE.MeshStandardMaterial({ color: 0x6B5A48, roughness: 0.9 }),
  bedding: new THREE.MeshStandardMaterial({ color: 0xE8DDD0, roughness: 0.95 }),
  masterBedding: new THREE.MeshStandardMaterial({ color: 0xC8B8A0, roughness: 0.9 }),
  counter: new THREE.MeshStandardMaterial({ color: 0xD0C8B8, roughness: 0.3, metalness: 0.1 }),
  cabinet: new THREE.MeshStandardMaterial({ map: woodTexture(256,256,'#6B4A2A'), roughness: 0.6 }),
  tile: new THREE.MeshStandardMaterial({ color: 0xE8E0D8, roughness: 0.4, metalness: 0.05 }),
  porcelain: new THREE.MeshStandardMaterial({ color: 0xF5F0EB, roughness: 0.2, metalness: 0.05 }),
  chimney: new THREE.MeshStandardMaterial({ color: 0x6B4020, roughness: 0.9 }),
  door: new THREE.MeshStandardMaterial({ map: woodTexture(128,256,'#4A2A10'), roughness: 0.6 }),
  water: new THREE.MeshStandardMaterial({ color: 0x6699BB, roughness: 0.1, metalness: 0.2, transparent: true, opacity: 0.7 }),
  fire: new THREE.MeshStandardMaterial({ color: 0xFF6600, emissive: 0xFF4400, emissiveIntensity: 0.8, transparent: true, opacity: 0.8 }),
  // Room floor highlights (subtle)
  floorLiving: new THREE.MeshStandardMaterial({ color: 0x8B7050, roughness: 0.6, transparent: true, opacity: 0.7 }),
  floorKitchen: new THREE.MeshStandardMaterial({ color: 0x6B8E5A, roughness: 0.6, transparent: true, opacity: 0.6 }),
  floorBedroom: new THREE.MeshStandardMaterial({ color: 0x7A6B8A, roughness: 0.6, transparent: true, opacity: 0.6 }),
  floorBath: new THREE.MeshStandardMaterial({ color: 0x5A8B8B, roughness: 0.4, transparent: true, opacity: 0.6 }),
  floorUtility: new THREE.MeshStandardMaterial({ color: 0x9A7B5A, roughness: 0.6, transparent: true, opacity: 0.6 }),
  floorTheatre: new THREE.MeshStandardMaterial({ color: 0x2A1A2A, roughness: 0.9 }),
  floorBar: new THREE.MeshStandardMaterial({ color: 0x5A3A2A, roughness: 0.7 }),
  floorMaster: new THREE.MeshStandardMaterial({ color: 0x8A6B7A, roughness: 0.6, transparent: true, opacity: 0.6 }),
};

const highlightMat = new THREE.MeshStandardMaterial({ 
  color: 0xd4a574, roughness: 0.5, transparent: true, opacity: 0.85,
  emissive: 0xd4a574, emissiveIntensity: 0.2
});

// ═══════════════════════════════════════════════════
// FLOOR GROUPS
// ═══════════════════════════════════════════════════
const G = {
  basement: new THREE.Group(),
  floor1: new THREE.Group(),
  floor2: new THREE.Group(),
  floor3: new THREE.Group(),
  outdoor: new THREE.Group(),
  structure: new THREE.Group(),
};
Object.values(G).forEach(g => scene.add(g));

// ═══════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════
const rooms = [];

function box(w,h,d,mat,group,x=0,y=0,z=0) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w,h,d), mat);
  m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true;
  group.add(m); return m;
}

function cyl(rt,rb,h,seg,mat,group,x=0,y=0,z=0) {
  const m = new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg), mat);
  m.position.set(x,y,z); m.castShadow=true; m.receiveShadow=true;
  group.add(m); return m;
}

function roomFloor(x,z,w,d,y,mat,name,desc,group,floorKey) {
  const m = box(w,0.15,d,mat,group,x,y+0.075,z);
  const edges = new THREE.LineSegments(
    new THREE.EdgesGeometry(new THREE.BoxGeometry(w,0.2,d)),
    new THREE.LineBasicMaterial({ color: 0xd4a574, transparent: true, opacity: 0.5 })
  );
  edges.position.set(x,y+0.1,z);
  group.add(edges);
  rooms.push({ name, desc, mesh: m, material: mat, line: edges, floor: floorKey });
  return m;
}

function wall(x,z,w,d,h,y,mat,group) { return box(w,h,d,mat,group,x,y+h/2,z); }

function addWindow(x,y,z,w,h,group,rotY=0) {
  // Window frame
  const frame = box(w+0.4, h+0.4, 0.3, M.walnut, group, x, y, z);
  if(rotY) frame.rotation.y = rotY;
  // Glass
  const glass = box(w-0.3, h-0.3, 0.1, M.glass, group, x, y, z+(rotY?0:0.01));
  if(rotY) glass.rotation.y = rotY;
  return frame;
}

// Furniture helpers
function bed(x,z,y,w,d,group,mat=M.bedding) {
  // Frame
  box(w, 1.2, d, M.walnut, group, x, y+0.6, z);
  // Mattress
  box(w-0.4, 0.6, d-0.3, mat, group, x, y+1.5, z);
  // Headboard
  box(w, 3, 0.6, M.walnut, group, x, y+2.5, z+d/2-0.3);
  // Pillows
  box(w*0.35, 0.4, 0.8, M.cream, group, x-w*0.2, y+2, z+d/2-1);
  box(w*0.35, 0.4, 0.8, M.cream, group, x+w*0.2, y+2, z+d/2-1);
}

function couch(x,z,y,group) {
  // U-shaped couch — 3 sections
  // Main seat (long)
  box(14, 2, 4, M.couchFabric, group, x, y+1, z);
  // Left arm
  box(4, 2, 6, M.couchFabric, group, x-6, y+1, z+1);
  // Right arm
  box(4, 2, 6, M.couchFabric, group, x+6, y+1, z+1);
  // Back cushions
  box(14, 1.5, 0.8, M.couchFabric, group, x, y+2.2, z+1.8);
  box(4, 1.5, 0.8, M.couchFabric, group, x-6, y+2.2, z+3.5);
  box(4, 1.5, 0.8, M.couchFabric, group, x+6, y+2.2, z+3.5);
  // Throw pillows
  box(1.2,1.2,1, new THREE.MeshStandardMaterial({color:0xA0522D,roughness:0.9}), group, x-5,y+2.5,z);
  box(1.2,1.2,1, new THREE.MeshStandardMaterial({color:0x8B7355,roughness:0.9}), group, x+5,y+2.5,z);
}

function diningTable(x,z,y,group) {
  // Long estate table
  box(14, 0.4, 5, M.oak, group, x, y+2.8, z);
  // Legs
  box(0.5,2.6,0.5, M.walnut, group, x-6, y+1.3, z-1.8);

function label(text, pos, floor) {
  const c = document.createElement('canvas');
  const ctx = c.getContext('2d');
  c.width=512; c.height=64;
  ctx.font='500 26px Inter,sans-serif';
  ctx.fillStyle='#d4a574';
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(text,256,32);
  const tex = new THREE.CanvasTexture(c);
  const s = new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,opacity:0.85}));
  s.position.copy(pos); s.scale.set(12,1.5,1);
  (G[floor]||G.floor1).add(s);
}

// INTERACTION
// ═══════════════════════════════════════════════════
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let selectedRoom = null;
const roomInfoEl = document.getElementById('room-info');
const roomNameEl = document.getElementById('room-name');
const roomDescEl = document.getElementById('room-desc');

renderer.domElement.addEventListener('pointerdown', e => {
  const rect = renderer.domElement.getBoundingClientRect();
  mouse.x = ((e.clientX-rect.left)/rect.width)*2-1;
  mouse.y = -((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(rooms.map(r=>r.mesh));
  if(selectedRoom) selectedRoom.mesh.material = selectedRoom.material;
  if(hits.length) {
    const room = rooms.find(r=>r.mesh===hits[0].object);
    if(room) {
      selectedRoom = room;
      room.mesh.material = highlightMat;
      roomNameEl.textContent = room.name;
      roomDescEl.textContent = room.desc;
      roomInfoEl.classList.add('visible');
    }
  } else { selectedRoom=null; roomInfoEl.classList.remove('visible'); }
});

document.querySelectorAll('.floor-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.floor-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const f = btn.dataset.floor;
    if(f==='all') {
      Object.values(G).forEach(g=>{g.visible=true});
      M.brickTrans.opacity = 0.25;
      animateTo(camera.position,{x:55,y:50,z:55});
      animateTo(controls.target,{x:0,y:6,z:0});
    } else {
      Object.entries(G).forEach(([k,g])=>{
        g.visible = k===f;
      });
      G.structure.visible = false;
      // Camera positions per floor
      const camY = {basement:-2, floor1:18, floor2:28, floor3:38, outdoor:20};
      const targY = {basement:-5, floor1:2, floor2:12, floor3:22, outdoor:1};
      animateTo(camera.position,{x:40,y:camY[f]||20,z:40});
      animateTo(controls.target,{x:0,y:targY[f]||6,z:0});
      if(f==='basement') {
        G.outdoor.visible = false; // hide ground so we can see underground
      } else {
        G.outdoor.visible = true;
      }
    }
    if(selectedRoom){selectedRoom.mesh.material=selectedRoom.material;selectedRoom=null;roomInfoEl.classList.remove('visible');}
  });
});

// ═══════════════════════════════════════════════════
// VIEW CONTROLS
// ═══════════════════════════════════════════════════
function animateTo(obj, target, dur=1000) {
  const s={x:obj.x,y:obj.y,z:obj.z}, t0=performance.now();
  (function update(now){
    const p=Math.min((now-t0)/dur,1);
    const e=p<0.5?4*p*p*p:1-Math.pow(-2*p+2,3)/2;
    obj.x=s.x+(target.x-s.x)*e;
    obj.y=s.y+(target.y-s.y)*e;
    obj.z=s.z+(target.z-s.z)*e;
    if(p<1)requestAnimationFrame(update);
  })(performance.now());
}

(function animate(){
  requestAnimationFrame(animate);
  controls.update();
  fireLight.intensity = 0.7+Math.sin(Date.now()*0.005)*0.4;
