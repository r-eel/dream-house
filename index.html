<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Emma & Rob's Dream House</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="canvas-container">
  <div id="header">
    <h1>Emma & Rob's Dream House</h1>
    <p>Interactive 3D Model — Click rooms to explore</p>
  </div>
  <div id="floor-panel">
    <button class="panel-toggle" id="toggle-floors" title="Toggle floors">🏠</button>
    <div class="panel-content" id="floor-buttons">
      <button class="floor-btn active" data-floor="all"><span class="floor-label">All Floors</span>Full View</button>
      <button class="floor-btn" data-floor="basement"><span class="floor-label">Basement</span>Theatre & Bar</button>
      <button class="floor-btn" data-floor="floor1"><span class="floor-label">Floor 1</span>Living & Kitchen</button>
      <button class="floor-btn" data-floor="floor2"><span class="floor-label">Floor 2</span>Bedrooms & Laundry</button>
      <button class="floor-btn" data-floor="floor3"><span class="floor-label">Floor 3</span>Master Suite</button>
      <button class="floor-btn" data-floor="outdoor"><span class="floor-label">Outdoor</span>Patio & Fire Pit</button>
    </div>
  </div>
  <div id="view-panel">
    <button class="panel-toggle" id="toggle-views" title="Toggle views">👁</button>
    <div class="panel-content" id="view-buttons">
      <button class="view-btn" id="btn-top" title="Top View">⬆</button>
      <button class="view-btn active" id="btn-3d" title="3D View">◆</button>
      <button class="view-btn" id="btn-front" title="Front View">▣</button>
      <button class="view-btn" id="btn-fps" title="Walkthrough Mode">🚶</button>
    </div>
  </div>
  <div id="fps-crosshair"></div>
  <div id="fps-hints">
    <h3>Walkthrough Mode</h3>
    <p><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> or <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd> to move<br>
    Mouse to look around<br>
    <kbd>ESC</kbd> to exit</p>
  </div>
  <div id="room-info">
    <div class="room-name" id="room-name"></div>
    <div class="room-desc" id="room-desc"></div>
  </div>
  <div id="legend-wrapper">
    <button class="panel-toggle" id="toggle-legend" title="Color key" style="align-self:flex-end;margin-bottom:6px">🎨</button>
    <div id="legend">
      <div class="legend-item"><div class="legend-swatch" style="background:#8B6F47"></div> Living Spaces</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#6B8E5A"></div> Kitchen & Dining</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#7A6B8A"></div> Bedrooms</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#5A8B8B"></div> Bathrooms</div>
      <div class="legend-item"><div class="legend-swatch" style="background:#9A7B5A"></div> Utility</div>
    </div>
  </div>
  <div id="instructions">Drag to rotate · Scroll to zoom · Click rooms</div>
</div>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}
</script>
<script type="module" src="src/main.js"></script>
</body>
</html>
